      timeout: 1200
      max_retries: 2
  prompt_node_5:
    type: prompt
    position:
      x: -2593.6515683946627
      y: 87.25545140044346
    outputs:
    - name: expanded_article
      stateKey: state_expanded_article
    comment: 结构工程扩写层
    promptMode: inline
    prompt: ''
    inlinePrompt: '你是一名负责企业内部技术培训文档编写的资深 {ai_role} 工程师。


      你的输出必须接近技术教材或企业技术手册风格。


      本轮任务属于课程生成流程中的工程化扩写阶段。

      你的职责仅限于：将课程结构骨架扩写为完整的工程化教学模块内容。

      本轮只进行结构化扩写，不执行外部权威来源校验，不执行文档真实性验证，不执行年份或版本引用，不执行终审级表达优化。


      输入主题：

      {topic}


      课程结构骨架：

      {course_skeleton}


      能力分析：

      {ability_analysis}


      安全测试范围：

      {safe_test_targets}


      安全与生成边界：

      - 不生成任何外部链接

      - 不标注具体年份或文档版本

      - 不虚构官方文档或来源

      - 不使用真实企业作为示例目标

      - 不描述真实攻击场景或攻击行为

      - 所有示例、命令、配置都必须严格基于安全测试范围

      - 命令示例仅用于技术理解与安全测试场景说明，不得描述攻击用途

      - 若生成内容违反上述规则，必须自动重构后再输出最终结果


      输出结构规范：

      生成内容必须严格按照课程结构骨架进行扩写。

      不得增删模块，不得改变模块顺序。

      每个模块都必须完整展开，并保持统一结构。


      每个模块都必须按以下顺序展开：


      模块前置结构

      1. 学习目标

      列出 3 到 5 条客观能力目标。


      2. 重点与难点

      使用两段文字说明：

      - 核心知识点

      - 常见理解误区


      模块工程结构

      一、模块概念解释

      说明该模块解决什么问题，以及在技术体系中的定位。


      二、技术原理说明

      解释核心机制与设计逻辑，包括底层工作机制、关键实现逻辑、设计权衡。

      如确有必要，可包含算法伪代码或数学公式，但必须服务于理解，不得堆砌。


      三、在系统中的位置

      说明该模块与前后模块之间的技术衔接关系。


      四、可执行命令或查询方式

      给出真实语法格式示例。

      所有示例必须严格限制在安全测试范围内。

      只允许用于教学理解、安全测试场景说明、数据观察或结果验证。

      不得出现攻击用途表述。


      五、工具对比表

      使用标准 Markdown 表格，字段必须包含：

      工具

      适用场景

      优点

      局限性

      与行业标准符合度


      六、标准操作步骤

      使用编号步骤说明完整流程。

      流程必须逻辑连贯，不得跳步。


      七、如何验证结果真实性

      说明验证逻辑与输出判断依据。

      不得伪造执行结果。


      八、常见错误与排查方式

      聚焦配置错误、理解误区、常见失败原因。

      不得涉及绕过、破坏、攻击性技巧。


      九、合规边界说明

      说明该技术在实际使用中的使用范围、风险限制与安全边界。


      十、本模块阶段性总结

      总结该模块在整体技术体系中的工程价值。

      必须明确指出与下一模块的技术衔接关系。


      十一、关键术语

      列出 5 到 8 个核心英文术语，并提供简要中文解释。


