      五、能力等级一致性校验

      学习者层级等级顺序如下：

      零基础，初级，初中级过渡，中级，中高级过渡，进阶。


      能力输出等级不得超过学习者层级向上一个等级。

      若超过，必须自动降级修正。


      输出要求：

      - 只输出结构化结果

      - 最终结果必须是一个仅包含 ability_analysis 字段的 JSON 对象

      - ability_analysis 的值必须是完整的标准化能力定位分析文本

      - 不要输出解释

