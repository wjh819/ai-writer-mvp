      四、能力本质定位总结

      用一句话总结（不超过40字）：

      本节点本质是在训练______能力。


      输出等级定位：

      只能选择以下之一：

      理解级 / 操作级 / 独立实战级 / 设计级


      能力适用范围说明（2条，每条20到40个中文字符，包含标点）

      1.

