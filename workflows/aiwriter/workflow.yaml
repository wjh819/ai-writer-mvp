  prompt_node_4:
    type: prompt
    position:
      x: -1151.7648515870674
      y: -441.741700638991
    outputs:
    - name: course_skeleton
      stateKey: state_course_skeleton
    comment: 课程结构重组
    promptMode: inline
    prompt: ''
    inlinePrompt: '你是一名网络安全课程结构建模工程师。


      你的任务是：将课程主题与能力定位分析结果，转换为抽象统一、层级一致、逻辑递进的七模块课程结构骨架。

      本轮只生成结构骨架，不展开正文内容，不扩写课程讲义。


      输入主题：

      {topic}


      能力定位分析结果：

      {ability_analysis}


      最高优先级规则：

      - 不讲解

      - 不展开技术

      - 不解释概念

      - 不出现工具名称

      - 不出现案例词

      - 不出现“例如”“比如”

      - 不出现教学语气

      - 不写列表说明

      - 不写括号补充

      - 不输出自检说明

      - 若违反任一条，必须自动重构后再输出最终结果


      核心转换原则：

      - 必须执行能力层级抽象转换，而不是条目改写

      - 不得直接复述能力模型中的原始关键词

      - 不得出现“分析能力”“操作能力”“判断能力”等直接能力名词

      - 模块语义必须上升一个抽象层级

      - 每个模块必须承担结构性阶段功能，而不是能力名称重述


      严格结构要求：

      输出必须严格符合以下格式：


      （主题完整标题）

      一、（模块标题）

      模块定位说明（不超过25字）

      二、（模块标题）

      模块定位说明（不超过25字）

      三、（模块标题）

      模块定位说明（不超过25字）

      四、（模块标题）

      模块定位说明（不超过25字）

      五、（模块标题）

      模块定位说明（不超过25字）

      六、（模块标题）

      模块定位说明（不超过25字）

      七、（模块标题）

      模块定位说明（不超过25字）


      不得增加空行结构，不得增加子标题，不得添加解释文字。


      七模块逻辑顺序强制约束：

      七模块必须严格按照以下抽象递进顺序构建：

      1. 认知基础重构

      2. 问题与目标明确

      3. 关键结构拆解

      4. 方法模型建立

      5. 操作路径形成

      6. 风险与边界控制

      7. 能力整合与输出


      模块标题规则：

      - 模块标题可以自拟

      - 建议使用动词加对象的形式

      - 不允许使用技术工具名

      - 不允许使用具体案例词

      - 不允许直接复制能力分析中的原句

      - 模块语义必须严格映射七阶段顺序，不得调换


      深度一致性约束：

      七个模块必须满足以下要求：

      - 抽象层级一致

      - 语义密度相近

      - 说明语气一致

      - 不得出现个别模块过于具体

      - 不得出现个别模块过于宏观


      内部质量要求：

      - 生成后必须自动检查是否存在能力条目复述

      - 必须自动检查是否存在能力关键词残留

      - 必须自动检查是否存在逻辑递进断裂

      - 必须自动检查是否出现教学语气

      - 必须自动检查是否出现技术名词

      - 必须自动检查是否字数超限

      - 若存在任一问题，自动重构一次后再输出最终版本

      - 禁止输出自检过程


      输出要求：

      - 只输出结构化结果

      - 最终结果必须是一个仅包含 course_skeleton 字段的 JSON 对象

      - course_skeleton 的值必须是完整七模块结构骨架文本

      - 不要输出解释

      - 不要输出分析过程

      - 不要输出 Markdown 代码块

      - 不要输出额外字段

      - 不要输出任何示例占位符'
    modelResourceId: '1'
    llm:
