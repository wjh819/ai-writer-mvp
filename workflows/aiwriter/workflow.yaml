nodes:
  prompt_node_1:
    type: prompt
    position:
      x: -2442.6503643788546
      y: -349.4349742344374
    outputs:
    - name: ai_role
      stateKey: state_ai_role
    comment: A：自动生成 {AI_ROLE}
    promptMode: inline
    prompt: ''
    inlinePrompt: '你是一名顶尖的 AI 提示词优化工程师，专门负责根据课程主题生成精准的 AI 专家角色。


      输入主题：

      {topic}


      你的任务是：

      1. 分析主题的核心技能点。

      2. 生成一个专业、简洁、权威的中文专家角色名称。

      3. 该结果将用于后续课程生成链路。


      输出约束：

      - 只输出结构化结果。

      - 只允许一个输出字段，字段名固定为 ai_role。

      - ai_role 的值必须是完整句式：你是一名“某某专家”。

      - 不要输出解释。

      - 不要输出分析过程。

      - 不要输出多个候选项。

      - 不要输出 Markdown 代码块。

      - 不要额外增加任何字段。

      - 不要在输出中使用任何示例占位符。


      角色命名要求：

      - 角色名称必须直接体现主题中最核心的能力。

      - 角色名称必须专业、简洁、权威。

      - 不要加入营销式修饰语。

      - 不要输出模板说明。'
    modelResourceId: '1'
    llm:
      temperature: 0.2
      timeout: 1200
      max_retries: 2
  input_node_1:
    type: input
    position:
      x: -2697.972827770376
      y: -749.2586643877817
    outputs:
    - name: value
      stateKey: out_input_node_1
    inputKey: input_node_1
    defaultValue: ''
  prompt_node_2:
    type: prompt
    position:
      x: -2039.7349811828565
      y: -353.3716559539555
    outputs:
    - name: safe_test_targets
      stateKey: state_safe_test_targets
    promptMode: inline
    prompt: ''
    inlinePrompt: '你是一名网络安全合规与教学环境架构专家。


      你的职责是根据课程主题生成一份严格受控的 SAFE_TEST_TARGETS 文本，供后续课程生成节点直接引用。

      所有后续示例、命令、配置、测试目标都必须严格限制在这份 SAFE_TEST_TARGETS 文本范围内。


      输入主题：

      {topic}


      任务要求：


      一、识别课程类型

      根据主题语义判断课程属于以下哪一类：


      类型A：恶意代码 / 样本分析类

      主题涉及恶意软件分析、病毒样本研究、恶意 JavaScript、Payload 结构分析、混淆代码解析、逆向工程。

      此类课程必须包含：合法靶场 + 公开样本来源。


      类型B：漏洞利用 / 攻击技术类

      主题涉及 Web 漏洞利用、攻击技术演示、渗透测试技巧。

      此类课程仅允许漏洞训练靶场，严禁提供任何病毒或恶意代码样本来源。


      类型C：侦察与信息收集类

      主题涉及信息获取、网络资产收集、OSINT、端口扫描、服务枚举、子域名枚举、指纹识别、被动侦察、目录爆破。

      此类课程仅允许官方授权目标、本地测试目标、公开安全测试 IP，严禁扫描未授权互联网资产。


      二、提取核心技术标签

      从主题中提取 1 到 3 个最核心的技术标签。

      优先从以下集合中选择：

      SQL Injection

      Command Injection

      SSTI

      XSS

      DOM XSS

      SSRF

      File Upload

      File Include

      Authentication Bypass

      Authorization Flaws

      Business Logic Flaws

      Malware Analysis

      JavaScript Obfuscation

      Payload Reverse Engineering

      Network Scanning

      Port Scanning

      Service Enumeration

      OSINT Techniques

      Subdomain Discovery

      Web Enumeration

      Directory Brute Forcing

      Fingerprinting

      Version Detection


      三、环境数据库

      只能从以下范围中选择，不得新增、不得编造：


      在线安全训练平台：

      https://portswigger.net/web-security

      https://owasp.org/www-project-juice-shop

      https://owasp.org/www-project-webgoat

      https://tryhackme.com

      https://hackthebox.com/academy


      可本地部署靶场：

      http://localhost:3000

      http://localhost:8080/dvwa

      http://localhost:8080/webgoat

      http://localhost/bwapp

      Metasploitable2/3（本地虚拟机）


      公开漏洞测试站点：

      http://testphp.vulnweb.com

      https://scanme.nmap.org


      恶意代码研究样本库（仅类型A允许）：

      https://bazaar.abuse.ch

      https://vx-underground.org

      https://github.com/ytisf/theZoo

      https://malware-traffic-analysis.net

      https://contagiodump.blogspot.com

      https://github.com/malware-samples/js-malware-samples


      四、环境匹配规则

      根据课程类型和技术标签，选择最合适的测试环境。


      五、筛选规则

      最终输出中：

      - 合法靶场数量必须为 4 到 7 个

      - 必须至少包含 1 个在线靶场

      - 必须至少包含 1 个本地靶场

      - 若为类型A，必须额外包含 3 到 5 个公开样本来源

      - 严禁包含真实企业系统、未授权网站、私有资源


      六、Fallback 规则

      只有在数据库中完全无法找到合适环境时，才允许触发严格受控的 fallback。

      若当前运行环境无法可靠确认官方授权信息，则禁止触发 fallback。

      即使触发 fallback，也只能加入明确带官方授权说明的合法训练目标。

      禁止加入任何未授权站点、灰色资源、企业站点。


      七、输出内容要求

      输出内容必须是一份完整的 SAFE_TEST_TARGETS 文本。

      该文本必须可直接被后续节点引用。

      文本内部必须包含：

      1. 一段总说明

      2. 合法演练靶场清单

      3. 若为类型A，再追加公开样本来源清单

      4. 若触发 fallback，再追加人工审核警告


      输出约束：

      - 只输出结构化结果

      - 顶层只允许一个字段，字段名固定为 safe_test_targets

      - safe_test_targets 的值必须是完整字符串

      - 不要输出解释

      - 不要输出分析过程

      - 不要输出 Markdown 代码块

      - 不要输出额外字段

      - 不要输出带花括号的格式示例

      - 输出文本中不得出现真实攻击导向表达

      - 所有描述都必须收口到授权测试、教学演示、安全研究场景'
    modelResourceId: '1'
    llm:
      temperature: 0.2
      timeout: 1200
      max_retries: 2
